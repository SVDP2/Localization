    type: "corner"
  - id: 2
    size: 199.5
    type: "corner"
  - id: 3
    size: 199.5
    type: "corner"

  # Medium markers (mid-edges + center) - 60mm
  - id: 4
    size: 60.0
    type: "middle"
  - id: 5
    size: 60.0
    type: "middle"
  - id: 6
    size: 60.0
    type: "middle"
  - id: 7
    size: 60.0
    type: "middle"
  - id: 8
    size: 60.0
    type: "middle"

  # Small markers (between medium markers) - 40mm
  - id: 9
