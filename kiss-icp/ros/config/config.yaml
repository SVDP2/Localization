# KISS-ICP Configuration for Skyautonet (ESKF Integration Test)
# 
# TF 구조:
#   - ESKF:     map -> base_link (기존)
#   - KISS-ICP: map -> base_link_icp (충돌 방지용 별도 프레임)
#
# Odometry 토픽: /kiss/odometry
#   - header.frame_id: map
#   - child_frame_id: base_link_icp

kiss_icp_node:
  ros__parameters:
    ####    ROS 관련 파라미터 (ESKF와 분리)    ####
    
    # base_frame: LiDAR → base_link 변환을 조회하기 위한 프레임 (실제 TF tree에 존재해야 함)
    # child_frame: 발행되는 TF/Odometry의 child frame 이름 (ESKF와 충돌 방지용)
    base_frame: "base_link"              # TF lookup용 (실제 존재하는 프레임)
    child_frame: "base_link_icp"         # TF 발행용 (KISS-ICP 전용 별도 프레임)
    lidar_odom_frame: "map"              # map 프레임 기준으로 발행
    publish_odom_tf: True                # TF 발행: map -> base_link_icp
    invert_odom_tf: False                # 정방향: map -> base_link_icp
    
    # Covariance (ESKF 융합 시 사용)
    position_covariance: 0.05            # 위치 공분산 (m²)
    orientation_covariance: 0.01         # 방향 공분산 (rad²)

    ####    Multi-LiDAR 설정 (Dual LiDAR: left + right)    ####
    multi_lidar:
      enabled: True                      # Multi-LiDAR 모드 활성화
      sync_tolerance_sec: 0.05           # 동기화 허용오차 (50ms)
      topics:                            # LiDAR 토픽 목록
        - "/sensing/lidar/left_lidar/pointcloud"
        - "/sensing/lidar/right_lidar/pointcloud"
      frames:                            # 각 LiDAR의 TF 프레임
        - "left_lidar_link"
        - "right_lidar_link"

    ####    ESKF 초기화 대기 설정    ####
    # ESKF localization이 초기화된 후(map->base_link TF 발행) 그 위치를 기준으로
    # KISS-ICP odometry를 시작합니다.
    eskf_init:
      enabled: True                      # ESKF 초기화 대기 활성화
      map_frame: "map"                   # ESKF의 map 프레임
      base_frame: "base_link"            # ESKF의 base_link 프레임
      timeout_sec: 30.0                  # 대기 타임아웃 (초), 초과 시 identity 포즈로 시작

    ####    Core KISS-ICP parameters    ####

    data:
      deskew: True                       # Motion deskew (고속 주행 시 필수)
      max_range: 80.0                    # 최대 감지 거리 (m)
      min_range: 2.0                     # 최소 감지 거리 (m) - 차량 자체 제외

    mapping:
      voxel_size: 0.8                    # 복셀 크기 (m) - 도로 환경에 맞게 조정
      max_points_per_voxel: 20

    adaptive_threshold:
      initial_threshold: 2.0
      min_motion_th: 0.1

    registration:
      max_num_iterations: 500
      convergence_criterion: 0.0001
      max_num_threads: 0                 # 0 = 자동 (CPU 코어 수)

