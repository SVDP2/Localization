aruco_detector_node:
  ros__parameters:
    marker_config_file: config/markers_board.yaml
    aruco_dict: DICT_6X6_250
    camera_calibration_file: config/cam_intrinsic.yaml
    image_topic: image_raw
    board_pose_topic: localization/aruco/board_pose
    pose_prior_topic: localization/relative/pose
    debug_image_topic: localization/aruco/debug_image
    base_frame: follower/base_link
    camera_frame: follower/usb_cam
    board_frame: leader/board
    leader_rear_frame: leader/leader_rear
    publish_tf: false
    publish_raw_aruco_tf: true
    raw_aruco_child_frame: follower/base_link_aruco_raw
    rectify_balance: 0.0
    min_markers_for_board: 1
    min_markers_to_initialize: 1
    max_position_jump_m: 0.35
    max_rotation_jump_deg: 55.0
    max_heading_jump_deg: 40.0
    max_reprojection_rmse_px: 6.0
    front_halfspace_min_z_m: 0.05
    max_view_angle_deg: 75.0
    feasible_x_min_m: -3.50
    feasible_x_max_m: -0.10
    feasible_abs_y_max_m: 1.00
    feasible_z_min_m: -0.50
    feasible_z_max_m: 0.80
    pose_prior_timeout_sec: 0.25
    pose_prior_rotation_gate_deg: 0.0

relative_localization_node:
  ros__parameters:
    imu_topic: imu
    board_pose_topic: localization/aruco/board_pose
    odom_topic: localization/relative/odom
    pose_topic: localization/relative/pose
    leader_rear_odom_topic: localization/leader_rear/odom
    leader_rear_pose_topic: localization/leader_rear/pose
    diagnostics_topic: diagnostics
    lidar_scan_topic: /follower/scan
    board_frame: leader/board
    leader_rear_frame: leader/leader_rear
    base_frame: follower/base_link
    camera_frame: follower/usb_cam
    publish_tf: true
    output_rate_hz: 100.0
    reset_timeout_sec: 1.0
    vision_delay_buffer_sec: 2.0
    aruco_position_gate_m: 1.0
    aruco_position_covariance_scale: 0.35
    position_smoothing_alpha: 0.55
    gyro_noise_std_radps: 0.05
    gyro_bias_noise_std_radps: 0.002
    initial_gyro_bias_std_radps: 0.02
    max_abs_gyro_bias_radps: 0.08
    initial_position_std_m: 0.20
    initial_orientation_std_deg: 5.0
    gyro_z_bias_radps: 0.0
    enable_startup_gyro_bias_calibration: true
    startup_calibration_duration_sec: 2.0
    startup_calibration_min_samples: 100
    startup_calibration_max_abs_gyro_z_radps: 0.05
    startup_calibration_max_gyro_z_stddev_radps: 0.01
    require_stationary_for_startup_calibration: true
    enable_lidar_icp_yaw: true
    lidar_icp_min_range_m: 0.15
    lidar_icp_max_range_m: 8.0
    lidar_icp_min_source_points: 45
    lidar_icp_yaw_var_rad2: 0.01
    lidar_icp_yaw_gate_deg: 25.0
    lidar_icp_max_abs_yaw_rate_radps: 1.5
    lidar_icp_voxel_size_m: 0.10
    lidar_icp_max_points_per_voxel: 20
    lidar_icp_max_num_iterations: 80
    lidar_icp_convergence_criterion: 0.0001
    lidar_icp_exclude_leader_box: true
    lidar_icp_exclude_x_min_m: 0.10
    lidar_icp_exclude_x_max_m: 1.20
    lidar_icp_exclude_abs_y_max_m: 0.45
    enable_lidar_icp_yaw_recovery: true
    lidar_icp_recovery_min_yaw_gate_rejects: 5
    lidar_icp_recovery_min_stable_samples: 5
    lidar_icp_recovery_yaw_gate_deg: 45.0
    lidar_icp_recovery_max_step_deg: 3.0
    lidar_icp_recovery_yaw_var_scale: 8.0
    lidar_icp_recovery_max_yaw_rate_delta_radps: 0.35
    camera_tf_startup_grace_sec: 2.0

pose_rviz_marker_node:
  ros__parameters:
    odom_topic: localization/leader_rear/odom
    marker_topic: localization/relative/pose_markers
    marker_namespace: relative_pose_viz
    axis_line_width: 0.01
    text_size: 0.08
    vehicle_arrow_length: 0.22
    vehicle_arrow_width: 0.05
    good_cov_trace: 0.02
    warn_cov_trace: 0.12
